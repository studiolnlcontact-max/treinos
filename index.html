<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Para Quedarnos Bien Bellacos</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: sans-serif;
  background: #0d0d0d;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px 40px;
  text-align: center;
}

.logo {
  font-size: 48px;
  margin-bottom: 8px;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #fff;
  line-height: 1.3;
  max-width: 320px;
  margin: 0 auto 10px;
}

.sub {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #6d28d9;
  margin-bottom: 48px;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 320px;
}

.card-link {
  display: block;
  text-decoration: none;
  background: #1a1a2e;
  border: 1px solid #2d1b69;
  border-radius: 16px;
  padding: 22px 20px;
  transition: background 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.card-link:active {
  background: #2d1b69;
}

.card-link .accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.card-liz .accent { background: linear-gradient(90deg, #f472b6, #ec4899); }
.card-tk .accent  { background: linear-gradient(90deg, #7c3aed, #4c1d95); }

.card-link .emoji { font-size: 32px; display: block; margin-bottom: 8px; }

.card-link .name {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  display: block;
  margin-bottom: 4px;
}

.card-liz .name { color: #f9a8d4; }
.card-tk  .name { color: #c4b5fd; }

.card-link .desc {
  font-size: 12px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.footer {
  margin-top: 52px;
  font-size: 11px;
  color: #3b2a5a;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  line-height: 1.8;
  max-width: 280px;
}

.footer strong {
  color: #6d28d9;
}
</style>
</head>
<body>

  <div class="logo">🏋️</div>
  <h1>Treino Para Quedarnos Bien Bellacos</h1>
  <p class="sub">Seleciona o seu treino</p>

  <div class="cards">

    <a href="treino_liz.html" class="card-link card-liz">
      <div class="accent"></div>
      <span class="emoji">🎀</span>
      <span class="name">Liz</span>
      <span class="desc">Posterior • Core • Braços</span>
    </a>

    <a href="treino_tk.html" class="card-link card-tk">
      <div class="accent"></div>
      <span class="emoji">💪</span>
      <span class="name">TK</span>
      <span class="desc">Força • Hipertrofia • Consistência</span>
    </a>

  </div>

  <div class="footer">
    Bendecidos por Dios<br>
    Diablo abajo<br>
    <strong>Papadios always above</strong>
  </div>

</body>
</html>
