<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07050f">
  <title>Entrenamiento Para Quedarnos Bellacos</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="page">

    <!-- Header -->
    <header class="site-header">
      <p class="header-eyebrow">Bem-vindos ao</p>
      <h1 class="header-title">
        Entrenamiento<br>
        Para Quedarnos<br>
        <em>Bellacos</em>
      </h1>
      <p class="header-sub">Seleciona o seu treino</p>
    </header>

    <!-- Trainer cards -->
    <div class="trainer-grid">

      <a href="treino_liz.html" class="trainer-card glass trainer-card--liz">
        <div class="card-inner">
          <span class="card-emoji">🎀</span>
          <div class="card-text">
            <div class="card-name">Liz</div>
            <div class="card-desc">Posterior · Core · Braços</div>
          </div>
          <span class="card-arrow">›</span>
        </div>
      </a>

      <a href="treino_tk.html" class="trainer-card glass trainer-card--tk">
        <div class="card-inner">
          <span class="card-emoji">💪</span>
          <div class="card-text">
            <div class="card-name">TK</div>
            <div class="card-desc">Força · Hipertrofia · Consistência</div>
          </div>
          <span class="card-arrow">›</span>
        </div>
      </a>

    </div>

    <!-- Verse -->
    <div class="verse glass">
      <p>
        Bendecidos por Dios<br>
        Diablo abajo<br>
        <strong>Papadios always above</strong>
      </p>
    </div>

  </div>

</body>
</html>
